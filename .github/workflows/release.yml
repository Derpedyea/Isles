name: Build GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update. Leave blank to use v<plugin.yml version>."
        required: false
        default: ""
      paper_api_version:
        description: "Paper API Maven version used to compile the plugin."
        required: false
        default: "26.1.2.build.69-stable"
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and publish release jar
    runs-on: ubuntu-latest

    env:
      PAPER_API_VERSION: ${{ inputs.paper_api_version || vars.PAPER_API_VERSION || '26.1.2.build.69-stable' }}
      DISPATCH_RELEASE_TAG: ${{ inputs.release_tag || '' }}
      PRERELEASE: ${{ inputs.prerelease || false }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Read plugin metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          plugin_version="$(sed -nE "s/^version:[[:space:]]*['\"]?([^'\"]+)['\"]?[[:space:]]*$/\1/p" src/main/resources/plugin.yml | head -n 1)"
          if [[ -z "${plugin_version}" ]]; then
            echo "Could not read version from src/main/resources/plugin.yml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${DISPATCH_RELEASE_TAG}"
            if [[ -z "${release_tag}" ]]; then
              release_tag="v${plugin_version}"
            fi
          fi

          jar_name="isles-${plugin_version}.jar"

          echo "plugin_version=${plugin_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "jar_name=${jar_name}" >> "${GITHUB_OUTPUT}"

          echo "Building ${jar_name} for release tag ${release_tag}"

      - name: Resolve Paper API dependencies
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/github-actions/deps
          cat > build/github-actions/pom.xml <<POM
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 https://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>net.mineperial</groupId>
            <artifactId>isles-ci-dependencies</artifactId>
            <version>1.0.0</version>
            <repositories>
              <repository>
                <id>papermc</id>
                <url>https://repo.papermc.io/repository/maven-public/</url>
              </repository>
            </repositories>
            <dependencies>
              <dependency>
                <groupId>io.papermc.paper</groupId>
                <artifactId>paper-api</artifactId>
                <version>${PAPER_API_VERSION}</version>
              </dependency>
            </dependencies>
          </project>
          POM

          mvn -B -q -f build/github-actions/pom.xml \
            org.apache.maven.plugins:maven-dependency-plugin:3.8.1:copy-dependencies \
            -DoutputDirectory="${PWD}/build/github-actions/deps"

          if ! find build/github-actions/deps -name "*.jar" -print -quit | grep -q .; then
            echo "No dependency jars were resolved." >&2
            exit 1
          fi

      - name: Compile and package plugin
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/classes
          find src/main/java -name "*.java" | sort > build/github-actions/sources.txt
          if [[ ! -s build/github-actions/sources.txt ]]; then
            echo "No Java source files found." >&2
            exit 1
          fi

          classpath="$(find build/github-actions/deps -name "*.jar" -print | paste -sd ':' -)"

          javac -encoding UTF-8 -cp "${classpath}" -d build/classes @build/github-actions/sources.txt
          cp -R src/main/resources/. build/classes/

          jar --create --file "build/${{ steps.meta.outputs.jar_name }}" -C build/classes .
          ls -lh "build/${{ steps.meta.outputs.jar_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.jar_name }}
          path: build/${{ steps.meta.outputs.jar_name }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          PLUGIN_VERSION: ${{ steps.meta.outputs.plugin_version }}
          JAR_PATH: build/${{ steps.meta.outputs.jar_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${JAR_PATH}" --clobber
          else
            args=(
              release create "${RELEASE_TAG}" "${JAR_PATH}"
              --title "Isles ${PLUGIN_VERSION}"
              --target "${GITHUB_SHA}"
              --generate-notes
            )

            if [[ "${PRERELEASE}" == "true" ]]; then
              args+=(--prerelease)
            fi

            gh "${args[@]}"
          fi
