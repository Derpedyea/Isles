name: isles
main: net.mineperial.skyblockcore.MineperialSkyblockCorePlugin
version: 1.0.0
api-version: '26.1'
description: >
  Isles provides custom islands and teams with protected void worlds,
  island upgrades, and managed travel. It adds shared center, Nether, and End
  progression zones with regenerating resources, timed events, PvP hotspots,
  and custom world generation.
author: Mineperial
load: STARTUP
commands:
  isles:
    description: Isles commands.
    usage: /isles
  msb:
    description: Legacy alias for Isles commands.
    usage: /msb
  setspawn:
    description: Set your Isles island spawnpoint.
    usage: /setspawn
  team:
    description: Manage Isles teams.
    usage: /team
permissions:
  isles.admin:
    description: Allows Isles admin commands.
    default: op
  mineperial.skyblock.admin:
    description: Legacy permission for Isles admin commands.
    default: op
